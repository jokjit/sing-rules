name: 编译规则集

on:
  workflow_dispatch:
    inputs:
      json_url:
        description: 'json文件链接'
        required: true
        type: string
      rule_name:
        description: '规则名称 (without extension, e.g. my-rules)'
        required: true
        type: string

  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 00:00 自动触发

  push:
    paths:
      - 'rules/**.json'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 仅手动触发时：下载新 JSON ──────────────────────────────
      - name: Download JSON from URL
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p rules
          echo "Downloading: ${{ github.event.inputs.json_url }}"
          curl -fsSL "${{ github.event.inputs.json_url }}" \
            -o "rules/${{ github.event.inputs.rule_name }}.json"
          echo "Saved to: rules/${{ github.event.inputs.rule_name }}.json"

      # ── 下载 sing-box ──────────────────────────────────────────
      - name: Download sing-box
        run: |
          LATEST=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest \
            | grep tag_name | cut -d'"' -f4)
          VERSION=${LATEST#v}
          wget -q "https://github.com/SagerNet/sing-box/releases/download/${LATEST}/sing-box-${VERSION}-linux-amd64.tar.gz"
          tar -xzf sing-box-*.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/
          sing-box version

      # ── 编译所有 rules/*.json → output/*.srs ──────────────────
      - name: Compile json to srs
        run: |
          mkdir -p output
          shopt -s nullglob
          files=(rules/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No JSON files found in rules/, skipping."
            exit 0
          fi
          for f in "${files[@]}"; do
            name=$(basename "$f" .json)
            # 存在同名 srs 则先删除，确保用新 json 覆盖重编译
            if [ -f "output/${name}.srs" ]; then
              rm -f "output/${name}.srs"
              echo "Removed old: ${name}.srs"
            fi
            sing-box rule-set compile --output "output/${name}.srs" "$f"
            echo "Compiled: ${name}.srs"
          done

      # ── 提交变更 ───────────────────────────────────────────────
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/ output/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              MSG="Add rule: ${{ github.event.inputs.rule_name }}"
            else
              MSG="Auto update rules (scheduled)"
            fi
            git commit -m "$MSG"
            git push
          fi
