name: Compile Rule Sets

on:
  push:
    paths:
      - 'rules/**.json'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download sing-box
        run: |
          LATEST=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep tag_name | cut -d'"' -f4)
          VERSION=${LATEST#v}
          wget -q "https://github.com/SagerNet/sing-box/releases/download/${LATEST}/sing-box-${VERSION}-linux-amd64.tar.gz"
          tar -xzf sing-box-*.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/
          sing-box version

      - name: Compile json to srs
        run: |
          mkdir -p output
          for f in rules/*.json; do
            name=$(basename "$f" .json)
            sing-box rule-set compile --output "output/${name}.srs" "$f"
            echo "Compiled: ${name}.srs"
          done

      - name: Commit srs files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.srs
          git diff --cached --quiet || git commit -m "Auto compile srs from json"
          git push
