name: 编译规则集

on:
  workflow_dispatch:
    inputs:
      json_url:
        description: '（可选）新规则 JSON 链接，填写后会保存到清单'
        required: false
        type: string
      rule_name:
        description: '（可选）规则名称，不含扩展名，与链接配套填写'
        required: false
        type: string

  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 00:00 自动触发

  push:
    paths:
      - 'rules/sources.json'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 手动触发且填写了链接：追加或更新到 sources.json ────────
      - name: Update sources.json
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.json_url != ''
        run: |
          URL="${{ github.event.inputs.json_url }}"
          NAME="${{ github.event.inputs.rule_name }}"
          if [ -z "$NAME" ]; then
            echo "::error::填写了链接但未填写规则名称，请同时填写 rule_name"
            exit 1
          fi
          python3 - <<EOF
import json

path = "rules/sources.json"
with open(path, "r") as f:
    sources = json.load(f)

found = False
for entry in sources:
    if entry["name"] == "$NAME":
        entry["url"] = "$URL"
        found = True
        break

if not found:
    sources.append({"name": "$NAME", "url": "$URL"})

with open(path, "w") as f:
    json.dump(sources, f, indent=2, ensure_ascii=False)

print(f"{'Updated' if found else 'Added'}: $NAME -> $URL")
EOF

      # ── 从 sources.json 下载所有规则 JSON ──────────────────────
      - name: Download rules from sources.json
        run: |
          mkdir -p rules
          python3 - <<'EOF'
import json, urllib.request, sys

path = "rules/sources.json"
with open(path, "r") as f:
    sources = json.load(f)

if not sources:
    print("sources.json 为空，没有需要下载的规则。")
    sys.exit(0)

for entry in sources:
    name = entry["name"]
    url  = entry["url"]
    dest = f"rules/{name}.json"
    print(f"Downloading {name} <- {url}")
    try:
        urllib.request.urlretrieve(url, dest)
        print(f"  Saved: {dest}")
    except Exception as e:
        print(f"  ERROR: {e}", file=sys.stderr)
        sys.exit(1)
EOF

      # ── 下载 sing-box ──────────────────────────────────────────
      - name: Download sing-box
        run: |
          LATEST=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest \
            | grep tag_name | cut -d'"' -f4)
          VERSION=${LATEST#v}
          wget -q "https://github.com/SagerNet/sing-box/releases/download/${LATEST}/sing-box-${VERSION}-linux-amd64.tar.gz"
          tar -xzf sing-box-*.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/
          sing-box version

      # ── 仅编译 sources.json 中列出的规则 ──────────────────────
      - name: Compile json to srs
        run: |
          mkdir -p output
          python3 - <<'EOF'
import json, os, subprocess, sys

with open("rules/sources.json", "r") as f:
    sources = json.load(f)

if not sources:
    print("sources.json 为空，跳过编译。")
    sys.exit(0)

for entry in sources:
    name = entry["name"]
    src  = f"rules/{name}.json"
    dst  = f"output/{name}.srs"

    if not os.path.exists(src):
        print(f"WARNING: {src} 不存在，跳过。")
        continue

    if os.path.exists(dst):
        os.remove(dst)
        print(f"Removed old: {name}.srs")

    result = subprocess.run(
        ["sing-box", "rule-set", "compile", "--output", dst, src],
        capture_output=True, text=True
    )
    if result.returncode != 0:
        print(f"ERROR compiling {name}:\n{result.stderr}", file=sys.stderr)
        sys.exit(1)

    print(f"Compiled: {name}.srs")
EOF

      # ── 提交变更 ───────────────────────────────────────────────
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/ output/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
               [ -n "${{ github.event.inputs.rule_name }}" ]; then
              MSG="Update rule: ${{ github.event.inputs.rule_name }}"
            else
              MSG="Auto update rules (scheduled)"
            fi
            git commit -m "$MSG"
            git push
          fi
