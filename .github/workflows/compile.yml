name: 编译规则集

on:
  workflow_dispatch:
    inputs:
      json_url:
        description: '可选 新规则JSON链接'
        required: false
        type: string
      rule_name:
        description: '可选 规则名称不含扩展名'
        required: false
        type: string
  schedule:
    - cron: '0 0 * * *'
  push:
    paths:
      - 'rules/**.json'

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    env:
      EVENT_NAME: ${{ github.event_name }}
      INPUT_URL: ${{ github.event.inputs.json_url }}
      INPUT_NAME: ${{ github.event.inputs.rule_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ 安装 jq
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl wget

      - name: Update sources.json
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.json_url != ''
        run: |
          if [ -z "$INPUT_NAME" ]; then
            echo "::error::请同时填写规则名称"
            exit 1
          fi

          EXISTS=$(jq --arg n "$INPUT_NAME" 'any(.[]; .name == $n)' rules/sources.json)

          if [ "$EXISTS" = "true" ]; then
            jq --arg n "$INPUT_NAME" --arg u "$INPUT_URL" \
              'map(if .name == $n then .url = $u else . end)' \
              rules/sources.json > tmp.json
          else
            jq --arg n "$INPUT_NAME" --arg u "$INPUT_URL" \
              '. += [{"name": $n, "url": $u}]' \
              rules/sources.json > tmp.json
          fi

          mv tmp.json rules/sources.json
          echo "Done: $INPUT_NAME -> $INPUT_URL"

      - name: Download rules
        run: |
          mkdir -p rules output

          COUNT=$(jq 'length' rules/sources.json)
          if [ "$COUNT" -eq 0 ]; then
            echo "sources.json 为空，跳过"
            exit 0
          fi

          jq -c '.[]' rules/sources.json | while read -r item; do
            name=$(echo "$item" | jq -r '.name')
            url=$(echo "$item" | jq -r '.url')

            echo "Downloading $name"
            curl -fsSL "$url" -o "rules/${name}.json" || {
              echo "Download failed: $name"
              exit 1
            }
          done

      - name: Download sing-box
        run: |
          VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name')
          VERSION=${VERSION#v}

          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz"

          tar -xzf sing-box-*.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/

          sing-box version

      - name: Compile rules
        run: |
          mkdir -p output
          HAS_ERROR=0

          shopt -s nullglob
          files=(rules/*.json)

          if [ ${#files[@]} -eq 0 ]; then
            echo "没有规则文件"
            exit 0
          fi

          for f in "${files[@]}"; do
            name=$(basename "$f" .json)

            [ "$name" = "sources" ] && continue

            dst="output/${name}.srs"
            rm -f "$dst"

            if sing-box rule-set compile --output "$dst" "$f"; then
              echo "Compiled: ${name}.srs"
            else
              echo "ERROR: $name"
              HAS_ERROR=1
            fi
          done

          [ $HAS_ERROR -eq 1 ] && exit 1

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add rules/ output/

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_NAME" ]; then
            git commit -m "Update rule: $INPUT_NAME"
          else
            git commit -m "Auto update rules"
          fi

          git push        continue
