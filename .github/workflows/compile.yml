
name: 编译规则集

on:
  workflow_dispatch:
    inputs:
      json_url:
        description: '（可选）新规则 JSON 链接，填写后会保存到清单'
        required: false
        type: string
      rule_name:
        description: '（可选）规则名称，不含扩展名，与链接配套填写'
        required: false
        type: string

  schedule:
    - cron: '0 0 * * *'

  push:
    paths:
      - 'rules/**.json'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update sources.json
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.json_url != ''
        env:
          INPUT_URL: ${{ github.event.inputs.json_url }}
          INPUT_NAME: ${{ github.event.inputs.rule_name }}
        run: |
          if [ -z "$INPUT_NAME" ]; then
            echo "::error::填写了链接但未填写规则名称"
            exit 1
          fi
          if jq -e --arg n "$INPUT_NAME" 'any(.[]; .name == $n)' rules/sources.json > /dev/null; then
            jq --arg n "$INPUT_NAME" --arg u "$INPUT_URL" \
              'map(if .name == $n then .url = $u else . end)' \
              rules/sources.json > /tmp/sources.tmp && mv /tmp/sources.tmp rules/sources.json
            echo "Updated: $INPUT_NAME -> $INPUT_URL"
          else
            jq --arg n "$INPUT_NAME" --arg u "$INPUT_URL" \
              '. += [{"name": $n, "url": $u}]' \
              rules/sources.json > /tmp/sources.tmp && mv /tmp/sources.tmp rules/sources.json
            echo "Added: $INPUT_NAME -> $INPUT_URL"
          fi

      - name: Download rules from sources.json
        run: |
          mkdir -p rules output
          COUNT=$(jq 'length' rules/sources.json)
          if [ "$COUNT" -eq 0 ]; then
            echo "sources.json 为空，跳过下载。"
            exit 0
          fi
          jq -r '.[] | "\(.name) \(.url)"' rules/sources.json | while read -r name url; do
            echo "Downloading $name <- $url"
            curl -fsSL "$url" -o "rules/${name}.json"
            echo "  Saved: rules/${name}.json"
          done

      - name: Download sing-box
        run: |
          LATEST=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep tag_name | cut -d'"' -f4)
          VERSION=${LATEST#v}
          wget -q "https://github.com/SagerNet/sing-box/releases/download/${LATEST}/sing-box-${VERSION}-linux-amd64.tar.gz"
          tar -xzf sing-box-*.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/
          sing-box version

      - name: Compile json to srs
        run: |
          mkdir -p output
          KNOWN=$(jq -r '.[].name' rules/sources.json)
          UPLOADED=""
          for f in rules/*.json; do
            fname=$(basename "$f" .json)
            [ "$fname" = "sources" ] && continue
            UPLOADED="$UPLOADED $fname"
          done
          ALL_NAMES=$(echo "$KNOWN $UPLOADED" | tr ' ' '\n' | sort -u | grep -v '^$')
          if [ -z "$ALL_NAMES" ]; then
            echo "没有需要编译的规则，跳过。"
            exit 0
          fi
          HAS_ERROR=0
          for name in $ALL_NAMES; do
            src="rules/${name}.json"
            dst="output/${name}.srs"
            if [ ! -f "$src" ]; then
              echo "WARNING: $src 不存在，跳过。"
              continue
            fi
            [ -f "$dst" ] && rm -f "$dst" && echo "Removed old: ${name}.srs"
            if sing-box rule-set compile --output "$dst" "$src"; then
              echo "Compiled: ${name}.srs"
            else
              echo "ERROR compiling: $name"
              HAS_ERROR=1
            fi
          done
          [ $HAS_ERROR -eq 1 ] && exit 1

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/ output/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.rule_name }}" ]; then
              MSG="Update rule: ${{ github.event.inputs.rule_name }}"
            else
              MSG="Auto update rules (scheduled)"
            fi
            git commit -m "$MSG"
            git push
          fifor fname in os.listdir("rules"):
